<!DOCTYPE html>
<!--
  Configurador de pieza (Bulón) que se muestra dentro de PartConfiguratorDialog (WebView2).
  Pantalla 1 = catálogo. Elegir "Bulón" abre un asistente de 4 pasos con una vista previa SVG
  acotada a la izquierda (la pieza del paso activo se dibuja en rojo) y los campos a la derecha:
    1) Cabeza: Ø1, L1
    2) Vástago: Ø2, L2  (Ø2 < Ø1)
    3) Ranura (opcional): P1 (posición desde la cabeza), E1 (ancho), D3 (Ø fondo) + botón "usar DIN 471"
    4) Chaflán (opcional): ángulo (45° por defecto) y medida (cateto axial) en el extremo libre

  Estilos en configurator.css, lógica en configurator.js.
  El host inyecta la tabla DIN 471 en window.DIN471 antes de cargar el JS; abrir este .html suelto
  en el navegador funciona igual (la tabla queda vacía). Al confirmar publica
  create|bolt|d1|l1|d2|l2|g|p1|e1|d3|c|cang|csize (o cancel) al host.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="configurator.css">
</head>
<body>

  <!-- ===== pantalla 1: catálogo ===== -->
  <section id="catalog">
    <h1>Configurar pieza</h1>
    <div class="sub">Elige la pieza que quieres generar</div>
    <div class="cards">
      <div class="card" id="cardBolt">
        <svg width="64" height="44" viewBox="0 0 64 44">
          <rect x="8" y="7" width="9" height="30" fill="none" stroke="#1C1C1C" stroke-width="1.5"/>
          <rect x="17" y="13" width="39" height="18" fill="none" stroke="#1C1C1C" stroke-width="1.5"/>
        </svg>
        <div class="ttl">BULON</div>
      </div>
      <div class="card soon"><span class="badge">Próximamente</span><div class="desc">Más piezas</div></div>
      <div class="card soon"><span class="badge">Próximamente</span><div class="desc">Más piezas</div></div>
    </div>
  </section>

  <!-- ===== pantalla 2: asistente del bulón ===== -->
  <section id="bolt" class="hidden">
    <h1>BULON</h1>
    <div class="sub" id="stepSub"></div>
    <div class="cfg">
      <div class="left" id="canvas"></div>
      <div class="right">
        <div class="steps">
          <div class="dot" id="dot1">1</div><div class="bar"></div>
          <div class="dot" id="dot2">2</div><div class="bar"></div>
          <div class="dot" id="dot3">3</div><div class="bar"></div>
          <div class="dot" id="dot4">4</div>
        </div>

        <!-- paso 1: cabeza -->
        <div class="group hidden" id="grp1">
          <h2>Paso 1 &middot; Cabeza</h2>
          <div class="field"><label>Diámetro Ø1</label><div class="inp"><input id="d1" type="number" min="0" step="any" value="30"><span class="u">mm</span></div></div>
          <div class="field"><label>Longitud L1</label><div class="inp"><input id="l1" type="number" min="0" step="any" value="5"><span class="u">mm</span></div></div>
        </div>

        <!-- paso 2: vástago -->
        <div class="group hidden" id="grp2">
          <h2>Paso 2 &middot; Vástago (cuerpo)</h2>
          <div class="field"><label>Diámetro Ø2</label><div class="inp"><input id="d2" type="number" min="0" step="any" value="20"><span class="u">mm</span></div></div>
          <div class="field"><label>Longitud L2</label><div class="inp"><input id="l2" type="number" min="0" step="any" value="25"><span class="u">mm</span></div></div>
        </div>

        <!-- paso 3: ranura -->
        <div class="group hidden" id="grp3">
          <h2>Paso 3 &middot; Ranura</h2>
          <label class="toggle"><input id="gOn" type="checkbox"><span>¿Lleva ranura?</span></label>
          <div class="opt off" id="gFields">
            <div class="din">
              <label class="toggle" style="margin:0"><input id="dinOn" type="checkbox"><span>Usar DIN 471</span></label>
              <span class="note" id="dinNote"></span>
            </div>
            <div class="field"><label>Posición P1 (desde la cabeza)</label><div class="inp"><input id="p1" type="number" min="0" step="any" value="15"><span class="u">mm</span></div></div>
            <div class="field"><label>Ancho E1</label><div class="inp"><input id="e1" type="number" min="0" step="any" value="1.3"><span class="u">mm</span></div></div>
            <div class="field"><label>Diámetro fondo D3</label><div class="inp"><input id="d3" type="number" min="0" step="any" value="19"><span class="u">mm</span></div></div>
          </div>
        </div>

        <!-- paso 4: chaflán -->
        <div class="group hidden" id="grp4">
          <h2>Paso 4 &middot; Chaflán</h2>
          <label class="toggle"><input id="cOn" type="checkbox"><span>¿Lleva chaflán?</span></label>
          <div class="opt off" id="cFields">
            <div class="field"><label>Ángulo</label><div class="inp"><input id="cang" type="number" min="0" max="90" step="any" value="45"><span class="u">°</span></div></div>
            <div class="field"><label>Medida (cateto axial)</label><div class="inp"><input id="csize" type="number" min="0" step="any" value="2"><span class="u">mm</span></div></div>
          </div>
        </div>

        <div id="err" class="err"></div>
        <div class="actions">
          <button class="ghost" id="btnBack">Volver</button>
          <button class="primary" id="btnNext">Siguiente</button>
        </div>
      </div>
    </div>
  </section>

<script src="configurator.js"></script>
</body>
</html>
